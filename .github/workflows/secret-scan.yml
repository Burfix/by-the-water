name: Secret Scan

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  scan:
    name: Detect secrets and committed .env files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Fail if any .env file (except .env.example) is tracked in git
      - name: Check for committed .env files
        run: |
          FILES=$(git ls-files | grep -E '(^|/)\.env($|\.[^e])' | grep -v '\.env\.example' || true)
          if [ -n "$FILES" ]; then
            echo "❌ Committed secret files detected:"
            echo "$FILES"
            exit 1
          fi
          echo "✅ No committed .env files"

      # Scan for high-entropy strings and common secret patterns
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
